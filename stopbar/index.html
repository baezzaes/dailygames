<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DailyGames" />
  <meta name="theme-color" content="#1c1308" />
  <title>정지 타이밍 게임 | DailyGames</title>
  <link rel="stylesheet" href="../shared.css" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="wrap">
    <header class="card hero">
      <div class="topline"><a class="btn secondary slim" href="../index.html">홈</a><div class="small pill">STOP BAR</div></div>
      <h1>정지 타이밍 게임</h1>
      <p class="sub">움직이는 바를 목표 구간 안에서 멈추세요. 연속 성공 수가 점수입니다.</p>
    </header>

    <section class="card">
      <div class="stats">
        <div class="stat"><span class="k">연속 성공</span><span id="scoreVal" class="v">0</span></div>
        <div class="stat"><span class="k">목표 폭</span><span id="zoneVal" class="v">24%</span></div>
        <div class="stat"><span class="k">상태</span><span id="stateVal" class="v">대기</span></div>
      </div>
      <div id="statusText" class="status-box">시작 후 STOP을 눌러 바를 멈추세요.</div>
      <div class="bar-wrap" id="barWrap">
        <div id="targetZone" class="target-zone"></div>
        <div id="movingBar" class="moving-bar"></div>
      </div>
      <div id="resultBanner" class="result-banner" hidden>
        <div id="resultPB" class="result-pb"></div>
        <div id="resultScore" class="result-score"></div>
        <div id="resultRank" class="result-rank"></div>
        <div class="result-actions"><button id="restartBtn" class="btn result-restart" type="button">다시 하기</button><button id="shareBtn" class="btn share" type="button">공유하기</button></div>
      </div>
      <div class="actions sticky-actions">
        <button id="startBtn" class="btn" type="button">시작</button>
        <button id="stopBtn" class="btn warning" type="button" disabled>STOP</button>
      </div>
    </section>

    <section class="card"><div class="row between"><h2 id="rankTitle" class="section-title">랭킹</h2></div><ol id="rankList" class="rank"></ol></section>
  </main>
  <script src="../game.js"></script>
  <script src="./app.js"></script>
</body>
</html>
