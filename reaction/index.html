<body>
  <main class="wrap">
    <header class="header card hero">
      <div class="topline">
        <a class="btn secondary slim" href="../index.html">홈</a>
        <div class="small pill">TIMING GAME</div>
      </div>
      <h1>반응속도 테스트</h1>
      <p class="sub">5라운드 평균 반응속도를 측정합니다. 화면이 바뀌면 즉시 탭하세요.</p>
    </header>

    <section class="card">
      </div>

      <div class="game">
        <div class="stats">
          <div class="stat"><span class="k">라운드</span><span id="reactionRound" class="v">0 / 5</span></div>
          <div class="stat"><span class="k">마지막 기록</span><span id="reactionLast" class="v">-</span></div>
          <div class="stat"><span class="k">평균</span><span id="reactionAvg" class="v">-</span></div>
        </div>

        <div id="reactionState" class="status-box">시작 버튼을 눌러주세요.</div>
        <button id="reactionPad" class="big reaction-pad" type="button" disabled>START</button>

        <div id="resultBanner" class="result-banner" hidden>
        <div id="resultPB" class="result-pb"></div>
          <div id="resultScore" class="result-score"></div>
        <div id="resultRank" class="result-rank"></div>
          <div class="result-actions"><button id="restartBtn" class="btn result-restart" type="button">다시 하기</button><button id="cardShareBtn" class="btn share" type="button">카드 공유</button></div>
        </div>
        <div class="actions sticky-actions">
          <button id="reactionStartBtn" class="btn" type="button">시작</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="row between">
        <h2 id="rankTitle" class="section-title">랭킹</h2>
        
      </div>
      <ol id="rankList" class="rank"></ol>
    </section>

    <section class="card how-to">
      <h2 class="section-title">게임 방법</h2>
      <ol class="how-to-list">
        <li>시작 버튼을 탭하면 준비 화면이 표시됩니다.</li>
        <li>화면 색상이 빨강에서 초록으로 바뀌는 순간 즉시 화면을 탭합니다.</li>
        <li>5라운드를 반복하며 각 라운드의 반응시간을 측정합니다.</li>
        <li>5라운드 평균 반응속도(ms)가 기록이며, 낮을수록 유리합니다.</li>
      </ol>
    </section>
  </main>
