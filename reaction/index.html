<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>반응속도 테스트 | DailyGames</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <main class="wrap">
    <header class="header">
      <h1>반응속도 테스트</h1>
      <p class="sub">5번 측정 후 평균 반응속도를 랭킹에 기록합니다.</p>
    </header>

    <section class="card">
      <div class="row">
        <div>
          <div class="label">닉네임</div>
          <input id="name" maxlength="12" placeholder="예: jason" />
        </div>
        <div>
          <div class="label">모드</div>
          <select id="mode">
            <option value="daily">오늘 랭킹</option>
            <option value="weekly">주간 랭킹</option>
          </select>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="row between game-head">
        <h2 class="section-title">반응속도 테스트</h2>
        <a class="btn secondary slim" href="../index.html">홈으로</a>
      </div>

      <div class="game">
        <div class="stats">
          <div class="stat"><span class="k">라운드</span><span id="reactionRound" class="v">0 / 5</span></div>
          <div class="stat"><span class="k">마지막 기록</span><span id="reactionLast" class="v">-</span></div>
          <div class="stat"><span class="k">평균</span><span id="reactionAvg" class="v">-</span></div>
        </div>

        <div id="reactionState" class="reaction-state">시작 버튼을 눌러주세요.</div>
        <button id="reactionPad" class="big reaction-pad" disabled>START</button>

        <div class="actions">
          <button id="reactionStartBtn" class="btn">시작</button>
          <button id="reactionResetBtn" class="btn secondary">랭킹 초기화</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="row between">
        <h2 id="rankTitle" class="section-title">랭킹</h2>
        <div class="small">브라우저 로컬 저장소 기준</div>
      </div>
      <ol id="rankList" class="rank"></ol>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
