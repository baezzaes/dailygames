<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111322" />
  <title>반응속도 테스트 | DailyGames</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="wrap">
    <header class="header card hero">
      <div class="topline">
        <a class="btn secondary slim" href="../index.html">홈</a>
        <div class="small pill">TIMING GAME</div>
      </div>
      <h1>반응속도 테스트</h1>
      <p class="sub">5라운드 평균 반응속도를 측정합니다. 화면이 바뀌면 즉시 탭하세요.</p>
    </header>

    <section class="card compact">
            <div class="row">
        <div>
          <div class="label">모드</div>
          <select id="mode">
            <option value="daily">오늘 랭킹</option>
            <option value="weekly">주간 랭킹</option>
          </select>
        </div>
      </div>
      <p class="sub" style="margin-top:8px;">플레이어: <strong id="playerNameDisplay">-</strong> &nbsp;<a href="../index.html" style="color:var(--cyan);font-size:12px;">변경</a></p>
      <script>document.getElementById("playerNameDisplay").textContent=localStorage.getItem("dailygames:lastname")||"미설정";</script>
    </section>

    <section class="card">
      <div class="row between game-head">
        <h2 class="section-title">플레이</h2>
        <div class="small">탭 반응 테스트</div>
      </div>

      <div class="game">
        <div class="stats">
          <div class="stat"><span class="k">라운드</span><span id="reactionRound" class="v">0 / 5</span></div>
          <div class="stat"><span class="k">마지막 기록</span><span id="reactionLast" class="v">-</span></div>
          <div class="stat"><span class="k">평균</span><span id="reactionAvg" class="v">-</span></div>
        </div>

        <div id="reactionState" class="status-box">시작 버튼을 눌러주세요.</div>
        <button id="reactionPad" class="big reaction-pad" type="button" disabled>START</button>

        <div class="actions sticky-actions">
          <button id="reactionStartBtn" class="btn" type="button">시작</button>
          <button id="reactionResetBtn" class="btn secondary" type="button">랭킹 초기화</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="row between">
        <h2 id="rankTitle" class="section-title">랭킹</h2>
        <div class="small">브라우저 로컬 저장소 기준</div>
      </div>
      <ol id="rankList" class="rank"></ol>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
