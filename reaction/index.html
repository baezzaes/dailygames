<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DailyGames" />
  <meta name="theme-color" content="#111322" />
  <title>반응속도 테스트 | DailyGames</title>
  <link rel="stylesheet" href="../shared.css?v=20260330-2" />
  <link rel="stylesheet" href="./style.css?v=20260330-2" />
</head>
<body>
  <main class="wrap">
    <header class="header card hero">
      <div class="topline">
        <a class="btn secondary slim" href="../index.html">홈</a>
        <div class="small pill">TIMING GAME</div>
      </div>
      <h1>반응속도 테스트</h1>
      <p class="sub">5라운드 평균 반응속도를 측정합니다. 화면이 바뀌면 즉시 탭하세요.</p>
    </header>

    <section class="card">
      </div>

      <div class="game">
        <div class="stats">
          <div class="stat"><span class="k">라운드</span><span id="reactionRound" class="v">0 / 5</span></div>
          <div class="stat"><span class="k">마지막 기록</span><span id="reactionLast" class="v">-</span></div>
          <div class="stat"><span class="k">평균</span><span id="reactionAvg" class="v">-</span></div>
        </div>

        <div id="reactionState" class="status-box">시작 버튼을 눌러주세요.</div>
        <button id="reactionPad" class="big reaction-pad" type="button" disabled>START</button>

        <div id="resultBanner" class="result-banner" hidden>
        <div id="resultPB" class="result-pb"></div>
          <div id="resultScore" class="result-score"></div>
        <div id="resultRank" class="result-rank"></div>
          <div class="result-actions"><button id="restartBtn" class="btn result-restart" type="button">다시 하기</button><button id="shareBtn" class="btn share" type="button">공유하기</button><button id="cardShareBtn" class="btn share" type="button">카드 공유</button></div>
        </div>
        <div class="actions sticky-actions">
          <button id="reactionStartBtn" class="btn" type="button">시작</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="row between">
        <h2 id="rankTitle" class="section-title">랭킹</h2>
        
      </div>
      <ol id="rankList" class="rank"></ol>
    </section>
  </main>

  <script src="../game.js?v=20260330-3"></script>
  <script src="./app.js"></script>
</body>
</html>
