<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="DailyGames" />
  <meta name="theme-color" content="#08131f" />
  <title>그림자 퀴즈 | DailyGames</title>
  <link rel="stylesheet" href="../shared.css?v=20260330-2" />
  <link rel="stylesheet" href="./style.css?v=20260330-2" />
</head>
<body>
  <main class="wrap">
    <header class="card hero">
      <div class="topline">
        <a class="btn secondary slim" href="../index.html">홈</a>
        <div class="small pill">SHADOW</div>
      </div>
      <h1>그림자 퀴즈</h1>
      <p class="sub">실루엣을 보고 무엇인지 맞혀보세요. 60초 동안 최대한 많이!</p>
    </header>

    <section class="card">
      <div class="canvas-shell">
        <canvas id="gameCanvas" class="game-canvas" aria-label="그림자 퀴즈 화면"></canvas>
      </div>
      <div id="choicesWrap" class="choices-grid" style="display:none"></div>
      <div id="resultBanner" class="result-banner" hidden>
        <div id="resultPB" class="result-pb"></div>
        <div id="resultScore" class="result-score"></div>
        <div id="resultRank" class="result-rank"></div>
        <div class="result-actions">
          <button id="restartBtn" class="btn result-restart" type="button">다시 하기</button>
          <button id="shareBtn" class="btn share" type="button">공유하기</button><button id="cardShareBtn" class="btn share" type="button">카드 공유</button>
        </div>
      </div>
      <div class="actions sticky-actions">
        <button id="startBtn" class="btn" type="button">시작</button>
      </div>
    </section>

    <section class="card"><div class="row between"><h2 id="rankTitle" class="section-title">랭킹</h2></div><ol id="rankList" class="rank"></ol></section>
  </main>
  <script src="../game.js?v=20260330-3"></script>
  <script src="./app.js"></script>
</body>
</html>
