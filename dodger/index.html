<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DailyGames" />
  <meta name="theme-color" content="#07111c" />
  <title>운석 피하기 | DailyGames</title>
  <link rel="stylesheet" href="../shared.css?v=20260330-2" />
  <link rel="stylesheet" href="./style.css?v=20260330-2" />
</head>
<body>
  <main class="wrap">
    <header class="header card hero">
      <div class="topline">
        <a class="btn secondary slim" href="../index.html">홈</a>
        <div class="small pill">GRAPHIC / CANVAS</div>
      </div>
      <h1>운석 피하기</h1>
      <p class="sub">좌우로 이동해서 떨어지는 운석을 피하세요. 모바일은 아래 방향 버튼을 길게 눌러 조작할 수 있습니다.</p>
    </header>

    <section class="card">
      </div>

      <div class="game">
        <div class="stats">
          <div class="stat"><span class="k">점수</span><span id="score" class="v">0</span></div>
          <div class="stat"><span class="k">생존 시간</span><span id="survival" class="v">0.0s</span></div>
          <div class="stat"><span class="k">상태</span><span id="state" class="v">대기</span></div>
        </div>

        <div class="status-box" id="statusText">시작을 누르고 방향키(← →) 또는 A/D로 이동하세요.</div>

        <div class="canvas-shell">
          <canvas id="gameCanvas" class="game-canvas" width="720" height="420" aria-label="운석 피하기 게임 화면"></canvas>
        </div>

        <div class="control-grid" aria-label="모바일 이동 버튼">
          <button id="leftBtn" class="btn secondary steer" type="button">◀ 왼쪽</button>
          <button id="rightBtn" class="btn secondary steer" type="button">오른쪽 ▶</button>
        </div>

        <div id="resultBanner" class="result-banner" hidden>
        <div id="resultPB" class="result-pb"></div>
          <div id="resultScore" class="result-score"></div>
        <div id="resultRank" class="result-rank"></div>
          <div class="result-actions"><button id="restartBtn" class="btn result-restart" type="button">다시 하기</button><button id="shareBtn" class="btn share" type="button">공유하기</button><button id="cardShareBtn" class="btn share" type="button">카드 공유</button></div>
        </div>
        <div class="actions sticky-actions">
          <button id="startBtn" class="btn" type="button">시작</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="row between">
        <h2 id="rankTitle" class="section-title">랭킹</h2>
        
      </div>
      <ol id="rankList" class="rank"></ol>
    </section>
  </main>

  <script src="../game.js"></script>
  <script src="./app.js"></script>
</body>
</html>
