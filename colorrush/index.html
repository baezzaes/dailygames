<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DailyGames" />
  <meta name="theme-color" content="#0d0a1a" />
  <title>색상 러시 | DailyGames</title>
  <link rel="stylesheet" href="../shared.css?v=20260401-1" />
  <link rel="stylesheet" href="./style.css?v=20260401-1" />
</head>
<body>
  <main class="wrap">
    <header class="card hero">
      <div class="topline">
        <a class="btn secondary slim" href="../index.html">홈</a>
        <div class="small pill">COGNITIVE / 30s</div>
      </div>
      <h1>색상 러시</h1>
      <p class="sub">글자의 <strong>색상</strong>을 탭하세요. 글자 뜻에 속으면 안 됩니다. 30초 동안 최대한 많이 맞히세요.</p>
    </header>

    <section class="card">
      <div class="stats">
        <div class="stat"><span class="k">점수</span><span id="scoreVal" class="v">0</span></div>
        <div class="stat"><span class="k">정답</span><span id="correctVal" class="v">0</span></div>
        <div class="stat"><span class="k">남은 시간</span><span id="timeVal" class="v">30.0s</span></div>
      </div>

      <div id="wordDisplay" class="word-display" aria-live="polite"></div>

      <div id="colorButtons" class="color-grid" role="group" aria-label="색상 선택"></div>

      <div id="feedback" class="feedback-text" aria-live="assertive"></div>

      <div id="resultBanner" class="result-banner" hidden>
        <div id="resultPB" class="result-pb"></div>
        <div id="resultScore" class="result-score"></div>
        <div id="resultRank" class="result-rank"></div>
        <div class="result-actions">
          <button id="restartBtn" class="btn result-restart" type="button">다시 하기</button>
          
          <button id="cardShareBtn" class="btn share" type="button">카드 공유</button>
        </div>
      </div>

      <div class="actions sticky-actions">
        <button id="startBtn" class="btn" type="button">시작</button>
      </div>
    </section>

    <section class="card">
      <div class="row between">
        <h2 id="rankTitle" class="section-title">랭킹</h2>
      </div>
      <ol id="rankList" class="rank"></ol>
    </section>
  </main>

  <script src="../game.js?v=20260401-1"></script>
  <script src="./app.js?v=20260401-1"></script>
</body>
</html>
