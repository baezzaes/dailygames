<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DailyGames" />
  <meta name="theme-color" content="#131127" />
  <meta name="description" content="점등 순서를 기억하고 같은 순서로 탭하세요. 라운드가 늘수록 패턴이 길어지는 기억력 테스트 게임." />
  <title>색상 기억 게임 | DailyGames</title>
  <link rel="stylesheet" href="../shared.css?v=20260331-2" />
  <link rel="stylesheet" href="./style.css?v=20260330-2" />
</head>
<body>
  <main class="wrap">
    <header class="card hero">
      <div class="topline">
        <a class="btn secondary slim" href="../index.html">홈</a>
        <div class="small pill">MEMORY</div>
      </div>
      <h1>색상 기억 게임</h1>
      <p class="sub">패턴을 기억하고 같은 순서로 탭하세요. 라운드가 올라갈수록 길어집니다.</p>
    </header>

    <section class="card">
      <div class="stats">
        <div class="stat"><span class="k">라운드</span><span id="roundVal" class="v">0</span></div>
        <div class="stat"><span class="k">진행 상태</span><span id="stateVal" class="v">대기</span></div>
      </div>
      <div id="statusText" class="status-box">시작 버튼을 누르면 패턴이 표시됩니다.</div>
      <div class="tile-grid" id="tileGrid">
        <button class="tile t0" data-idx="0" type="button" aria-label="타일 1"></button>
        <button class="tile t1" data-idx="1" type="button" aria-label="타일 2"></button>
        <button class="tile t2" data-idx="2" type="button" aria-label="타일 3"></button>
        <button class="tile t3" data-idx="3" type="button" aria-label="타일 4"></button>
      </div>
      <div id="resultBanner" class="result-banner" hidden>
        <div id="resultPB" class="result-pb"></div>
        <div id="resultScore" class="result-score"></div>
        <div id="resultRank" class="result-rank"></div>
        <div class="result-actions"><button id="restartBtn" class="btn result-restart" type="button">다시 하기</button><button id="cardShareBtn" class="btn share" type="button">카드 공유</button></div>
      </div>
      <div class="actions sticky-actions">
        <button id="startBtn" class="btn" type="button">시작</button>
      </div>
    </section>

    <section class="card">
      <div class="row between">
        <h2 id="rankTitle" class="section-title">랭킹</h2>
        
      </div>
      <ol id="rankList" class="rank"></ol>
    </section>

    <section class="card how-to">
      <h2 class="section-title">게임 방법</h2>
      <ol class="how-to-list">
        <li>시작 버튼을 탭하면 타일이 순서대로 점등됩니다.</li>
        <li>점등 순서를 기억하고 같은 순서로 타일을 탭합니다.</li>
        <li>성공하면 다음 라운드로 진행되며 패턴이 한 개씩 추가됩니다.</li>
        <li>순서를 틀리면 종료되며 도달한 라운드 수가 점수입니다.</li>
      </ol>
    </section>
  </main>
  <script src="../game.js?v=20260331-3"></script>
  <script src="./app.js"></script>
</body>
</html>
