<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DailyGames" />
  <meta name="theme-color" content="#070b1b" />
  <title>스타블리츠 | DailyGames</title>
  <link rel="stylesheet" href="../shared.css?v=20260331-3" />
  <link rel="stylesheet" href="./style.css?v=20260401-1" />
</head>
<body>
  <main class="wrap">
    <header class="card hero">
      <div class="topline">
        <a class="btn secondary slim" href="../index.html">홈</a>
        <div class="small pill">GRAPHIC / FX</div>
      </div>
      <h1>스타블리츠</h1>
      <p class="sub">네온 전투기를 조작해 크리스탈을 수집하고 지뢰를 피하세요. 30초 동안 높은 점수를 노립니다.</p>
    </header>

    <section class="card">
      <div class="stats">
        <div class="stat"><span class="k">점수</span><span id="scoreVal" class="v">0</span></div>
        <div class="stat"><span class="k">실드</span><span id="shieldVal" class="v">3</span></div>
        <div class="stat"><span class="k">콤보</span><span id="comboVal" class="v">x1</span></div>
        <div class="stat"><span class="k">남은 시간</span><span id="timeVal" class="v">30.0s</span></div>
      </div>

      <div id="statusText" class="status-box">시작 후 화면을 드래그해 기체를 이동하세요. 지뢰를 스치면 근접 보너스가 들어옵니다.</div>

      <div class="canvas-shell">
        <canvas id="gameCanvas" class="game-canvas" width="960" height="540" aria-label="스타블리츠 게임 화면"></canvas>
      </div>

      <div class="control-grid" aria-label="모바일 이동 버튼">
        <button id="leftBtn" class="btn secondary steer" type="button">◀ 왼쪽</button>
        <button id="rightBtn" class="btn secondary steer" type="button">오른쪽 ▶</button>
      </div>

      <div id="resultBanner" class="result-banner" hidden>
        <div id="resultPB" class="result-pb"></div>
        <div id="resultScore" class="result-score"></div>
        <div id="resultRank" class="result-rank"></div>
        <div class="result-actions">
          <button id="restartBtn" class="btn result-restart" type="button">다시 하기</button>
          <button id="shareBtn" class="btn share" type="button">공유하기</button>
          <button id="cardShareBtn" class="btn share" type="button">카드 공유</button>
        </div>
      </div>

      <div class="actions sticky-actions">
        <button id="startBtn" class="btn" type="button">출격</button>
      </div>
    </section>

    <section class="card">
      <div class="row between">
        <h2 id="rankTitle" class="section-title">랭킹</h2>
      </div>
      <ol id="rankList" class="rank"></ol>
    </section>
  </main>

  <script src="../game.js?v=20260331-3"></script>
  <script src="./app.js"></script>
</body>
</html>
