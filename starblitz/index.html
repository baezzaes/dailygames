<body>
  <main class="wrap">
    <header class="header card hero">
      <div class="topline">
        <a class="btn secondary slim" href="../">홈</a>
        <div class="small pill">ACTION</div>
      </div>
      <h1>⭐ 스타블리츠</h1>
      <p class="sub">네온 전투기를 조작해 크리스탈을 수집하고 지뢰를 피하세요. 30초 동안 높은 점수를 노립니다.</p>
    </header>

    <section class="card">
      <div id="statusText" class="status-box">시작 후 화면을 드래그해 기체를 이동하세요. 지뢰를 스치면 근접 보너스가 들어옵니다.</div>

      <div class="canvas-shell">
        <canvas id="gameCanvas" class="game-canvas" width="960" height="540" aria-label="스타블리츠 게임 화면"></canvas>
      </div>

      <div class="control-grid" aria-label="모바일 이동 버튼">
        <button id="leftBtn" class="btn secondary steer" type="button">◀ 왼쪽</button>
        <button id="rightBtn" class="btn secondary steer" type="button">오른쪽 ▶</button>
      </div>

      <div id="resultBanner" class="result-banner" hidden>
        <div id="resultPB" class="result-pb"></div>
        <div id="resultScore" class="result-score"></div>
        <div id="resultRank" class="result-rank"></div>
        <div class="result-actions">
          <button id="restartBtn" class="btn result-restart" type="button">다시 하기</button>
          
          <button id="cardShareBtn" class="btn share" type="button">카드 공유</button>
        </div>
      </div>

      <div class="actions sticky-actions">
        <button id="startBtn" class="btn" type="button">출격</button>
      </div>
    </section>

    <section class="card">
      <div class="row between">
        <h2 id="rankTitle" class="section-title">랭킹</h2>
      </div>
      <ol id="rankList" class="rank"></ol>
    </section>

    <section class="card how-to">
      <h2 class="section-title">게임 방법</h2>
      <ol class="how-to-list">
        <li>시작 버튼을 탭하면 네온 전투기 조작이 시작됩니다.</li>
        <li>화면을 드래그하거나 방향 버튼으로 전투기를 이동합니다.</li>
        <li>크리스탈에 닿으면 점수가 올라가고, 지뢰에 닿으면 감점됩니다.</li>
        <li>30초 후 자동 종료되며 최종 점수가 기록됩니다.</li>
      </ol>
    </section>
  </main>

  <script src="../game.js?v=20260412-2"></script>
  <script src="./app.js?v=20260412-5"></script>
</body>
