<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DailyGames" />
  <meta name="theme-color" content="#091424" />
  <title>레인 탭 | DailyGames</title>
  <link rel="stylesheet" href="../shared.css?v=20260330-2" />
  <link rel="stylesheet" href="./style.css?v=20260330-2" />
</head>
<body>
  <main class="wrap">
    <header class="card hero">
      <div class="topline"><a class="btn secondary slim" href="../index.html">홈</a><div class="small pill">LANE TAP</div></div>
      <h1>레인 탭</h1>
      <p class="sub">내려오는 노트가 히트 라인에 오면 같은 레인을 탭하세요.</p>
    </header>

    <section class="card">
      <div class="stats">
        <div class="stat"><span class="k">점수</span><span id="scoreVal" class="v">0</span></div>
        <div class="stat"><span class="k">남은 체력</span><span id="lifeVal" class="v">3</span></div>
        <div class="stat"><span class="k">상태</span><span id="stateVal" class="v">대기</span></div>
      </div>
      <div id="statusText" class="status-box">START 후 레인 버튼(1~4)을 눌러 노트를 맞추세요.</div>
      <div class="canvas-shell"><canvas id="gameCanvas" class="game-canvas" width="720" height="420" aria-label="레인 탭 게임 화면"></canvas></div>
      <div class="lane-buttons">
        <button class="btn lane-btn" data-lane="0" type="button">1</button>
        <button class="btn lane-btn" data-lane="1" type="button">2</button>
        <button class="btn lane-btn" data-lane="2" type="button">3</button>
        <button class="btn lane-btn" data-lane="3" type="button">4</button>
      </div>
      <div id="resultBanner" class="result-banner" hidden>
        <div id="resultPB" class="result-pb"></div>
        <div id="resultScore" class="result-score"></div>
        <div id="resultRank" class="result-rank"></div>
        <div class="result-actions"><button id="restartBtn" class="btn result-restart" type="button">다시 하기</button><button id="shareBtn" class="btn share" type="button">공유하기</button><button id="cardShareBtn" class="btn share" type="button">카드 공유</button></div>
      </div>
      <div class="actions sticky-actions">
        <button id="startBtn" class="btn" type="button">START</button>
      </div>
    </section>

    <section class="card"><div class="row between"><h2 id="rankTitle" class="section-title">랭킹</h2></div><ol id="rankList" class="rank"></ol></section>
  </main>
  <script src="../game.js?v=20260330-3"></script>
  <script src="./app.js"></script>
</body>
</html>
