<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DailyGames" />
  <meta name="theme-color" content="#08131f" />
  <title>피하기 + 코인 먹기 | DailyGames</title>
  <link rel="stylesheet" href="../shared.css?v=20260330-2" />
  <link rel="stylesheet" href="./style.css?v=20260330-2" />
</head>
<body>
  <main class="wrap">
    <header class="card hero">
      <div class="topline">
        <a class="btn secondary slim" href="../index.html">홈</a>
        <div class="small pill">RUNNER</div>
      </div>
      <h1>피하기 + 코인 먹기</h1>
      <p class="sub">장애물은 피하고 코인은 먹으세요. 좌우 버튼 또는 방향키로 이동합니다.</p>
    </header>

    <section class="card">
      <div class="stats">
        <div class="stat"><span class="k">점수</span><span id="score" class="v">0</span></div>
        <div class="stat"><span class="k">생존</span><span id="time" class="v">0.0s</span></div>
        <div class="stat"><span class="k">상태</span><span id="state" class="v">대기</span></div>
      </div>
      <div id="statusText" class="status-box">시작을 누르고 좌우로 이동하세요.</div>
      <div class="canvas-shell"><canvas id="gameCanvas" class="game-canvas" width="720" height="420" aria-label="러너 게임 화면"></canvas></div>
      <div class="control-grid">
        <button id="leftBtn" class="btn secondary" type="button">◀ 왼쪽</button>
        <button id="rightBtn" class="btn secondary" type="button">오른쪽 ▶</button>
      </div>
      <div id="resultBanner" class="result-banner" hidden>
        <div id="resultPB" class="result-pb"></div>
        <div id="resultScore" class="result-score"></div>
        <div id="resultRank" class="result-rank"></div>
        <div class="result-actions"><button id="restartBtn" class="btn result-restart" type="button">다시 하기</button><button id="shareBtn" class="btn share" type="button">공유하기</button><button id="cardShareBtn" class="btn share" type="button">카드 공유</button></div>
      </div>
      <div class="actions sticky-actions">
        <button id="startBtn" class="btn" type="button">시작</button>
      </div>
    </section>

    <section class="card"><div class="row between"><h2 id="rankTitle" class="section-title">랭킹</h2></div><ol id="rankList" class="rank"></ol></section>
  </main>
  <script src="../game.js"></script>
  <script src="./app.js"></script>
</body>
</html>
