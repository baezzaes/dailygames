<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DailyGames" />
  <meta name="theme-color" content="#10182b" />
  <title>1초 카운트 정지 | DailyGames</title>
  <link rel="stylesheet" href="../shared.css?v=20260331-3" />
  <link rel="stylesheet" href="./style.css?v=20260331-1" />
</head>
<body>
  <main class="wrap">
    <header class="card hero">
      <div class="topline"><a class="btn secondary slim" href="../index.html">홈</a><div class="small pill">TIMING / COUNT</div></div>
      <h1>1초 카운트 정지</h1>
      <p class="sub">5라운드 동안 1.000초에 최대한 가깝게 멈추세요. 평균 오차(ms)가 낮을수록 유리합니다.</p>
    </header>

    <section class="card">
      <div class="stats">
        <div class="stat"><span class="k">라운드</span><span id="roundVal" class="v">0 / 5</span></div>
        <div class="stat"><span class="k">현재 카운트</span><span id="countVal" class="v">0.000s</span></div>
        <div class="stat"><span class="k">최근 오차</span><span id="errorVal" class="v">-</span></div>
      </div>
      <div id="statusText" class="status-box">시작을 누르면 카운트가 진행됩니다. STOP을 1.000초에 맞춰보세요.</div>

      <div id="resultBanner" class="result-banner" hidden>
        <div id="resultPB" class="result-pb"></div>
        <div id="resultScore" class="result-score"></div>
        <div id="resultRank" class="result-rank"></div>
        <div class="result-actions"><button id="restartBtn" class="btn result-restart" type="button">다시 하기</button><button id="cardShareBtn" class="btn share" type="button">카드 공유</button></div>
      </div>

      <div class="actions sticky-actions">
        <button id="startBtn" class="btn" type="button">시작</button>
        <button id="stopBtn" class="btn warning" type="button" disabled>STOP</button>
      </div>
    </section>

    <section class="card"><div class="row between"><h2 id="rankTitle" class="section-title">랭킹</h2></div><ol id="rankList" class="rank"></ol></section>
  </main>
  <script src="../game.js?v=20260331-3"></script>
  <script src="./app.js"></script>
</body>
</html>
