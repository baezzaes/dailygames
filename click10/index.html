<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0d111f" />
  <title>10초 클릭 챌린지 | DailyGames</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="wrap">
    <header class="header card hero">
      <div class="topline">
        <a class="btn secondary slim" href="../index.html">홈</a>
        <div class="small pill">TOUCH GAME</div>
      </div>
      <h1>10초 클릭 챌린지</h1>
      <p class="sub">10초 동안 큰 버튼을 가능한 많이 눌러 기록을 만드세요. 모바일 탭 플레이에 맞게 버튼을 크게 구성했습니다.</p>
    </header>

    <section class="card compact">
            <div class="row">
        <div>
          <div class="label">모드</div>
          <select id="mode">
            <option value="daily">오늘 랭킹</option>
            <option value="weekly">주간 랭킹</option>
          </select>
        </div>
      </div>
      <p class="sub" style="margin-top:8px;">플레이어: <strong id="playerNameDisplay">-</strong> &nbsp;<a href="../index.html" style="color:var(--cyan);font-size:12px;">변경</a></p>
      <script>document.getElementById("playerNameDisplay").textContent=localStorage.getItem("dailygames:lastname")||"미설정";</script>
    </section>

    <section class="card">
      <div class="row between game-head">
        <h2 class="section-title">플레이</h2>
        <div class="small">탭 중심 조작</div>
      </div>

      <div class="game">
        <div class="stats">
          <div class="stat"><span class="k">남은 시간</span><span id="clickTime" class="v">10.0</span></div>
          <div class="stat"><span class="k">클릭 수</span><span id="clickScore" class="v">0</span></div>
          <div class="stat"><span class="k">상태</span><span id="clickState" class="v">대기</span></div>
        </div>

        <button id="clickBigBtn" class="big" type="button" disabled>탭!</button>

        <div class="actions sticky-actions">
          <button id="clickStartBtn" class="btn" type="button">시작</button>
          <button id="clickResetBtn" class="btn secondary" type="button">랭킹 초기화</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="row between">
        <h2 id="rankTitle" class="section-title">랭킹</h2>
        <div class="small">브라우저 로컬 저장소 기준</div>
      </div>
      <ol id="rankList" class="rank"></ol>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
