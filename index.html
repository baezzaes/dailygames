<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>세균전 - DailyGames</title>
  <meta name="description" content="매일 새로운 판! AI와 세균 영역 대결. 더 많은 칸을 차지하면 승리." />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- 닉네임 입력 모달 -->
  <div id="nickModal" class="modal-overlay" hidden>
    <div class="modal-box">
      <h2 class="modal-title">닉네임 설정</h2>
      <p class="modal-desc">랭킹에 표시될 이름을 입력하세요</p>
      <input id="nickInput" class="nick-input" type="text" maxlength="10" placeholder="닉네임 (최대 10자)" autocomplete="off" />
      <p id="nickError" class="nick-error" hidden></p>
      <button id="nickConfirm" class="btn primary" type="button">시작하기</button>
    </div>
  </div>

  <div class="wrap">
    <header class="site-header">
      <div class="header-inner">
        <span class="site-logo">🧫 세균전</span>
        <span id="headerNick" class="header-nick"></span>
      </div>
    </header>

    <main class="game-main">
      <div class="game-meta row between">
        <span id="dateLabel" class="date-label"></span>
        <span class="difficulty-label">AI: 보통</span>
      </div>

      <!-- 점수판 -->
      <div class="scoreboard">
        <div class="score-item player">
          <span class="score-dot player-dot"></span>
          <span class="score-name">나</span>
          <span id="playerScore" class="score-num">2</span>
        </div>
        <div class="score-vs">VS</div>
        <div class="score-item ai">
          <span class="score-dot ai-dot"></span>
          <span class="score-name">AI</span>
          <span id="aiScore" class="score-num">2</span>
        </div>
      </div>

      <!-- 상태 메시지 -->
      <div id="statusMsg" class="status-msg">시작 버튼을 누르세요</div>

      <!-- 게임 보드 -->
      <div id="boardWrap" class="board-wrap">
        <div id="board" class="board"></div>
      </div>

      <!-- 컨트롤 -->
      <div class="game-controls">
        <button id="startBtn" class="btn primary" type="button">오늘의 대결 시작</button>
        <button id="restartBtn" class="btn secondary" type="button" hidden>다시하기</button>
      </div>

      <!-- 결과 배너 -->
      <div id="resultBanner" class="result-banner" hidden>
        <div id="resultPB" class="result-pb"></div>
        <div id="resultScore" class="result-score"></div>
        <div id="resultRank" class="result-rank"></div>
        <div class="result-actions">
          <button id="cardShareBtn" class="btn share" type="button">카드 공유</button>
        </div>
      </div>

      <!-- 랭킹 -->
      <section class="rank-section">
        <div class="row between">
          <h2 id="rankTitle" class="rank-title">세균전 오늘 TOP 10</h2>
        </div>
        <ol id="rankList" class="rank-list"><li>로딩 중…</li></ol>
      </section>
    </main>
  </div>

  <script src="/game.js"></script>
  <script src="/app.js"></script>
</body>
</html>
