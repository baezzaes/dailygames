<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DailyGames - 10초 클릭 챌린지</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <header class="header">
      <h1>🎮 DailyGames</h1>
      <p class="sub">10초 동안 최대한 많이 클릭해서 점수 등록!</p>
    </header>

    <section class="card">
      <div class="row">
        <div>
          <div class="label">닉네임</div>
          <input id="name" maxlength="12" placeholder="예: jason" />
        </div>
        <div>
          <div class="label">모드</div>
          <select id="mode">
            <option value="daily">오늘 랭킹</option>
            <option value="weekly">이번주 랭킹</option>
          </select>
        </div>
      </div>

      <div class="game">
        <div class="stats">
          <div class="stat"><span class="k">남은 시간</span><span id="time" class="v">10.0</span></div>
          <div class="stat"><span class="k">클릭 수</span><span id="score" class="v">0</span></div>
          <div class="stat"><span class="k">상태</span><span id="state" class="v">대기</span></div>
        </div>

        <button id="bigBtn" class="big" disabled>클릭!</button>

        <div class="actions">
          <button id="startBtn" class="btn">시작</button>
          <button id="resetBtn" class="btn secondary">기록 초기화(로컬)</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="row between">
        <h2 id="rankTitle">🏆 오늘 랭킹 TOP 10</h2>
        <div class="small">*현재는 브라우저(로컬) 기준</div>
      </div>
      <ol id="rankList" class="rank"></ol>
    </section>

    <footer class="footer">
      <span>다음 단계: Cloudflare Functions로 “진짜 랭킹” 만들기</span>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
